# @package _global_
defaults:
  - tiny

batch_size:
  train: 1
  eval: 1

hardware:
  num_workers:
    train: 0
    eval: 0

dataset:
  train:
    sampling: random
    random:
      weighted_sampling: false

logging:
  train:
    high_dim:
      enable: false
  validation:
    high_dim:
      enable: false
