defaults:
  - general
  - dataset: ???  # Will be specified via command line
  - model: rnndet
  - _self_

is_train: True

# Override model configuration with complete settings
model:
  backbone:
    name: MaxViTRNN
    compile:
      enable: false
      args:
        mode: reduce-overhead
    input_channels: 20
    enable_masking: false
    partition_split_32: 1
    embed_dim: 64
    dim_multiplier: [1, 2, 4, 8]
    num_blocks: [1, 1, 1, 1]
    T_max_chrono_init: [4, 8, 16, 32]
    stem:
      patch_size: 4
    stage:
      downsample:
        type: patch
        overlap: true
        norm_affine: true
      attention:
        use_torch_mha: false
        partition_size: [8, 10]  # This will be dynamically set
        dim_head: 32
        attention_bias: true
        mlp_activation: gelu
        mlp_gated: false
        mlp_bias: true
        mlp_ratio: 4
        drop_mlp: 0
        drop_path: 0
        ls_init_value: 1.0e-05
      lstm:
        dws_conv: false
        dws_conv_only_hidden: true
        dws_conv_kernel_size: 3
        drop_cell_update: 0
  fpn:
    name: PAFPN
    compile:
      enable: false
      args:
        mode: reduce-overhead
    depth: 0.67
    in_stages: [2, 3, 4]
    depthwise: false
    act: "silu"
  head:
    name: YoloX
    compile:
      enable: false
      args:
        mode: reduce-overhead
    depthwise: false
    act: "silu"
    obj_focal_loss: false
    bbox_loss_weighting: ""
    ignore_bbox_thresh: null
    ignore_label: 1024
    ignore_bg_k: 0
  postprocess:
    confidence_threshold: 0.1
    nms_threshold: 0.45
  use_label_every: 1
  ignore_image: false
